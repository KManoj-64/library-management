<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - Library Management System</title>
  <link rel="stylesheet" href="/css/tailwind.css">
</head>
<body>
<div id="loginPageContainer">
  <div class="box">
    <h2>📚 Join Library Hub</h2>
    <form id="registerForm">
        <input type="hidden" name="role" id="role" value="student">
        <label>Full Name</label>
        <input type="text" name="fullname" id="fullname" placeholder="Enter your full name" required>
        <label>Email Address</label>
        <input type="email" name="email" id="email" placeholder="your.email@example.com" required>
        <label>Create Username</label>
        <input type="text" name="username" id="username" placeholder="Choose a username" required>
        <label>Create Password</label>
        <input type="password" name="password" id="password" placeholder="Minimum 6 characters" required>
        <label>Confirm Password</label>
        <input type="password" name="confirmPassword" id="confirmPassword" placeholder="Re-enter password" required>
        <button type="submit">Create Account</button>
    </form>
    <p class="link-text">Already have an account? <a href="/pages/login.html">Sign In Here</a></p>
  </div>
</div>
<script src="/js/auth.js"></script>
</body>
</html>
